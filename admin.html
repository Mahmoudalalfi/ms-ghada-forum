<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard | Ms Ghada Adel Forum</title>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Sora:wght@600;700;800&display=swap");

    :root {
      --bg: #f8f5ff;
      --panel: #ffffff;
      --text: #1f1559;
      --muted: #6a63a1;
      --line: #e7deff;
      --accent: #6e2bff;
      --accent-2: #ff62c3;
      --danger: #b12659;
      --radius: 16px;
      --shadow: 0 20px 36px rgba(78, 44, 183, 0.14);
    }

    * {
      box-sizing: border-box;
      -webkit-user-select: none;
      user-select: none;
    }

    body {
      margin: 0;
      font-family: "Manrope", "Segoe UI", Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(1200px 500px at -20% 0%, rgba(255, 98, 195, 0.14), transparent 60%),
        radial-gradient(900px 420px at 120% 10%, rgba(110, 43, 255, 0.16), transparent 55%),
        linear-gradient(180deg, #fdfcff 0%, var(--bg) 52%, #f5f0ff 100%);
      min-height: 100vh;
      padding: 28px 18px;
    }

    .wrap {
      width: min(1120px, 100%);
      margin: 0 auto;
      display: grid;
      gap: 16px;
    }

    .top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 10px;
    }

    h1 {
      margin: 0;
      font-family: "Sora", "Manrope", sans-serif;
      font-size: clamp(1.2rem, 2.4vw, 2rem);
    }

    .top a {
      text-decoration: none;
      color: #422c9d;
      font-weight: 700;
      border: 1px solid var(--line);
      background: #fff;
      padding: 9px 12px;
      border-radius: 999px;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: var(--shadow);
      padding: 16px;
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr 240px auto auto;
      gap: 10px;
      align-items: center;
    }

    input,
    select,
    button {
      font: inherit;
    }

    input,
    select {
      width: 100%;
      border: 1px solid #ddd0ff;
      border-radius: 12px;
      padding: 10px 12px;
      background: #fff;
      color: #25186f;
    }

    .native-select-hidden {
      position: absolute;
      width: 1px;
      height: 1px;
      opacity: 0;
      pointer-events: none;
    }

    .filter-select {
      position: relative;
    }

    .filter-trigger {
      width: 100%;
      border: 1px solid #ddd0ff;
      border-radius: 12px;
      background: #fff;
      color: #25186f;
      padding: 10px 12px;
      min-height: 44px;
      text-align: left;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      cursor: pointer;
      transition: border-color 220ms ease, box-shadow 220ms ease, transform 220ms ease;
    }

    .filter-trigger:hover {
      transform: translateY(-1px);
    }

    .filter-select.open .filter-trigger {
      border-color: #b99fff;
      box-shadow: 0 0 0 3px rgba(110, 43, 255, 0.14);
    }

    .filter-trigger .arrow {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      border: 1px solid #ece2ff;
      display: grid;
      place-items: center;
      color: #5037a5;
      flex-shrink: 0;
      transition: transform 220ms ease;
    }

    .filter-select.open .filter-trigger .arrow {
      transform: rotate(180deg);
    }

    .filter-panel {
      position: absolute;
      top: calc(100% + 8px);
      left: 0;
      right: 0;
      border: 1px solid #e7deff;
      border-radius: 12px;
      background: #fff;
      box-shadow: 0 14px 26px rgba(72, 39, 169, 0.16);
      padding: 6px;
      display: grid;
      gap: 6px;
      max-height: 260px;
      overflow-y: auto;
      opacity: 0;
      pointer-events: none;
      transform: translateY(6px);
      transition: opacity 220ms ease, transform 220ms ease;
      z-index: 12;
    }

    .filter-select.open .filter-panel {
      opacity: 1;
      pointer-events: auto;
      transform: translateY(0);
    }

    .filter-option {
      width: 100%;
      border: 1px solid transparent;
      border-radius: 10px;
      background: #fbf8ff;
      color: #2c1d75;
      font-weight: 600;
      font-size: 0.92rem;
      text-align: left;
      padding: 9px 10px;
      cursor: pointer;
      transition: background 220ms ease, border-color 220ms ease, transform 220ms ease;
    }

    .filter-option:hover {
      transform: translateX(2px);
      border-color: #e3d8ff;
      background: #f5efff;
    }

    .filter-option.active {
      border-color: transparent;
      background: linear-gradient(120deg, #7f45ff, #ff62c3);
      color: #fff;
    }

    button {
      border: none;
      border-radius: 12px;
      padding: 10px 13px;
      cursor: pointer;
      font-weight: 700;
      color: #fff;
      background: linear-gradient(120deg, var(--accent), var(--accent-2));
    }

    .secondary {
      background: #f2ecff;
      color: #3f2f83;
      border: 1px solid #e2d6ff;
    }

    .status {
      color: var(--muted);
      font-size: 0.93rem;
      margin-top: 8px;
    }

    .table-wrap {
      overflow: auto;
      margin-top: 12px;
      border: 1px solid var(--line);
      border-radius: 12px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 980px;
      background: #fff;
    }

    th,
    td {
      text-align: left;
      padding: 10px;
      border-bottom: 1px solid #eee7ff;
      vertical-align: top;
      font-size: 0.92rem;
    }

    th {
      position: sticky;
      top: 0;
      background: #f9f5ff;
      color: #47368f;
      font-weight: 700;
      z-index: 1;
    }

    .delete-btn {
      background: #fff1f5;
      color: var(--danger);
      border: 1px solid #ffd0de;
      padding: 6px 10px;
      border-radius: 10px;
      font-weight: 700;
      cursor: pointer;
    }

    .empty {
      padding: 18px;
      color: var(--muted);
      text-align: center;
    }

    @media (max-width: 820px) {
      .controls {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <div class="top">
      <h1>Registrations Admin Dashboard</h1>
      <a href="/index.html">Back to Registration Form</a>
    </div>

    <section class="panel">
      <div class="controls">
        <input id="searchInput" type="text" placeholder="Search by name, school or phone">
        <select id="courseFilter" class="native-select-hidden">
          <option value="">All Courses</option>
          <option>EDEXCEL ONLINE</option>
          <option>EDEXCEL PHYSICAL</option>
          <option>CAMB PHYSICAL</option>
          <option>CAMB ONLINE</option>
          <option>PRE IG CAMB</option>
          <option>PRE IG EDEXCEL</option>
          <option>AS</option>
        </select>
        <div class="filter-select" id="courseFilterSelect">
          <button id="courseFilterTrigger" class="filter-trigger" type="button" aria-haspopup="listbox" aria-expanded="false">
            <span id="courseFilterLabel">All Courses</span>
            <span class="arrow">⌄</span>
          </button>
          <div class="filter-panel" id="courseFilterPanel" role="listbox" aria-label="Filter by course">
            <button type="button" class="filter-option active" data-value="">All Courses</button>
            <button type="button" class="filter-option" data-value="EDEXCEL ONLINE">EDEXCEL ONLINE</button>
            <button type="button" class="filter-option" data-value="EDEXCEL PHYSICAL">EDEXCEL PHYSICAL</button>
            <button type="button" class="filter-option" data-value="CAMB PHYSICAL">CAMB PHYSICAL</button>
            <button type="button" class="filter-option" data-value="CAMB ONLINE">CAMB ONLINE</button>
            <button type="button" class="filter-option" data-value="PRE IG CAMB">PRE IG CAMB</button>
            <button type="button" class="filter-option" data-value="PRE IG EDEXCEL">PRE IG EDEXCEL</button>
            <button type="button" class="filter-option" data-value="AS">AS</button>
          </div>
        </div>
        <button id="refreshBtn" class="secondary" type="button">Refresh</button>
        <button id="exportBtn" type="button">Export CSV</button>
      </div>
      <p class="status" id="statusText">Loading registrations...</p>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Student Name</th>
              <th>Student School</th>
              <th>Student Phone</th>
              <th>Parent Phone</th>
              <th>Course</th>
              <th>How They Knew Us</th>
              <th>Created At</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
      <div class="empty" id="emptyState" hidden>No registrations yet.</div>
    </section>
  </main>

  <script>
    const tableBody = document.getElementById("tableBody");
    const statusText = document.getElementById("statusText");
    const emptyState = document.getElementById("emptyState");
    const searchInput = document.getElementById("searchInput");
    const courseFilter = document.getElementById("courseFilter");
    const courseFilterSelect = document.getElementById("courseFilterSelect");
    const courseFilterTrigger = document.getElementById("courseFilterTrigger");
    const courseFilterLabel = document.getElementById("courseFilterLabel");
    const courseFilterPanel = document.getElementById("courseFilterPanel");
    const courseFilterOptions = courseFilterPanel.querySelectorAll(".filter-option");
    const refreshBtn = document.getElementById("refreshBtn");
    const exportBtn = document.getElementById("exportBtn");

    let rowsCache = [];
    let searchTimer = null;

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function toCsv(rows) {
      const headers = [
        "id",
        "student_name",
        "student_school",
        "student_phone",
        "parent_phone",
        "course",
        "discover_source",
        "created_at"
      ];
      const lines = [headers.join(",")];
      rows.forEach((row) => {
        const line = headers.map((header) => {
          const raw = row[header] == null ? "" : String(row[header]);
          return "\"" + raw.replace(/"/g, "\"\"") + "\"";
        }).join(",");
        lines.push(line);
      });
      return lines.join("\n");
    }

    function renderTable(rows) {
      tableBody.innerHTML = "";

      if (!rows.length) {
        emptyState.hidden = false;
        return;
      }

      emptyState.hidden = true;
      rows.forEach((row) => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${escapeHtml(row.id)}</td>
          <td>${escapeHtml(row.student_name)}</td>
          <td>${escapeHtml(row.student_school)}</td>
          <td>${escapeHtml(row.student_phone)}</td>
          <td>${escapeHtml(row.parent_phone)}</td>
          <td>${escapeHtml(row.course)}</td>
          <td>${escapeHtml(row.discover_source)}</td>
          <td>${escapeHtml(row.created_at)}</td>
          <td><button class="delete-btn" data-id="${escapeHtml(row.id)}">Delete</button></td>
        `;
        tableBody.appendChild(tr);
      });
    }

    function closeCourseFilter() {
      courseFilterSelect.classList.remove("open");
      courseFilterTrigger.setAttribute("aria-expanded", "false");
    }

    function setCourseFilter(value) {
      courseFilter.value = value;
      courseFilterLabel.textContent = value || "All Courses";

      courseFilterOptions.forEach((option) => {
        option.classList.toggle("active", option.dataset.value === value);
      });
    }

    async function loadRegistrations() {
      statusText.textContent = "Loading registrations...";

      const params = new URLSearchParams();
      const search = searchInput.value.trim();
      const course = courseFilter.value.trim();
      if (search) params.set("search", search);
      if (course) params.set("course", course);

      const response = await fetch("/api/registrations?" + params.toString());
      if (!response.ok) {
        throw new Error("Failed to load registrations.");
      }

      const data = await response.json();
      rowsCache = Array.isArray(data) ? data : [];
      renderTable(rowsCache);
      statusText.textContent = "Showing " + rowsCache.length + " registration(s).";
    }

    async function deleteRegistration(id) {
      const ok = window.confirm("Delete registration #" + id + "?");
      if (!ok) return;

      const response = await fetch("/api/registrations/" + id, {
        method: "DELETE",
        headers: {
          "X-Requested-With": "XMLHttpRequest"
        }
      });

      if (!response.ok) {
        const payload = await response.json().catch(() => ({}));
        throw new Error(payload.error || "Failed to delete registration.");
      }
    }

    tableBody.addEventListener("click", async (event) => {
      const btn = event.target.closest(".delete-btn");
      if (!btn) return;

      const id = Number.parseInt(btn.dataset.id, 10);
      if (!id) return;

      try {
        await deleteRegistration(id);
        await loadRegistrations();
      } catch (error) {
        statusText.textContent = error.message;
      }
    });

    searchInput.addEventListener("input", () => {
      window.clearTimeout(searchTimer);
      searchTimer = window.setTimeout(() => {
        loadRegistrations().catch((error) => {
          statusText.textContent = error.message;
        });
      }, 300);
    });

    courseFilterTrigger.addEventListener("click", () => {
      const isOpen = courseFilterSelect.classList.toggle("open");
      courseFilterTrigger.setAttribute("aria-expanded", String(isOpen));
    });

    courseFilterOptions.forEach((option) => {
      option.addEventListener("click", () => {
        setCourseFilter(option.dataset.value);
        closeCourseFilter();
        loadRegistrations().catch((error) => {
          statusText.textContent = error.message;
        });
      });
    });

    document.addEventListener("click", (event) => {
      if (!courseFilterSelect.contains(event.target)) {
        closeCourseFilter();
      }
    });

    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape") {
        closeCourseFilter();
      }
    });

    refreshBtn.addEventListener("click", () => {
      loadRegistrations().catch((error) => {
        statusText.textContent = error.message;
      });
    });

    exportBtn.addEventListener("click", () => {
      const csv = toCsv(rowsCache);
      const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "registrations.csv";
      a.click();
      URL.revokeObjectURL(url);
    });

    setCourseFilter(courseFilter.value);

    loadRegistrations().catch((error) => {
      statusText.textContent = error.message;
    });

    document.addEventListener("contextmenu", (event) => {
      event.preventDefault();
    });

    document.addEventListener("copy", (event) => {
      event.preventDefault();
    });

    document.addEventListener("cut", (event) => {
      event.preventDefault();
    });

    document.addEventListener("dragstart", (event) => {
      event.preventDefault();
    });

    document.addEventListener("selectstart", (event) => {
      event.preventDefault();
    });
  </script>
</body>
</html>
