<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 64" fill="none">
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="80" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#C084FC"/>
    </linearGradient>
    <linearGradient id="grad2" x1="0" y1="0" x2="80" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#A855F7"/>
      <stop offset="100%" stop-color="#E879F9"/>
    </linearGradient>
  </defs>

  <!-- G letter -->
  <text x="1" y="52" fill="url(#grad)" font-size="54" font-weight="800" font-family="Plus Jakarta Sans, system-ui, sans-serif">G</text>

  <!-- Flask neck cap -->
  <rect x="53" y="6" width="14" height="3" rx="1.5" fill="url(#grad)" opacity="0.55"/>

  <!-- Flask body outline -->
  <path d="M55 9 v14 l-10 16 a11 11 0 0 0 9.5 16.5 h11 a11 11 0 0 0 9.5-16.5 l-10-16 V9 z"
        fill="none" stroke="url(#grad)" stroke-width="2.4" stroke-linejoin="round"/>

  <!-- Liquid fill -->
  <path d="M45.5 47 a11 11 0 0 0 9 8.5 h11 a11 11 0 0 0 9-8.5 z"
        fill="url(#grad2)" opacity="0.25"/>

  <!-- Bubbles -->
  <circle cx="57" cy="48" r="2.4" fill="url(#grad2)" opacity="0.6"/>
  <circle cx="65" cy="53" r="1.6" fill="url(#grad2)" opacity="0.45"/>
  <circle cx="61" cy="44" r="1.1" fill="url(#grad2)" opacity="0.35"/>
</svg>
