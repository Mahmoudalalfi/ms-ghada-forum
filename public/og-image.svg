<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <!-- Page background gradient -->
    <radialGradient id="bg1" cx="82%" cy="2%" r="50%">
      <stop offset="0%" stop-color="#fde0ec" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <radialGradient id="bg2" cx="10%" cy="90%" r="50%">
      <stop offset="0%" stop-color="#fbcfe8" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <radialGradient id="bg3" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#f4f4ff" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>

    <!-- Card border gradient -->
    <linearGradient id="cardBorder" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#C084FC" stop-opacity="0.7"/>
      <stop offset="45%"  stop-color="#E879F9" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#F472B6" stop-opacity="0.55"/>
    </linearGradient>

    <!-- Text gradient -->
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#6d28d9"/>
      <stop offset="30%"  stop-color="#a855f7"/>
      <stop offset="60%"  stop-color="#e879f9"/>
      <stop offset="100%" stop-color="#f472b6"/>
    </linearGradient>

    <!-- Logo gradient -->
    <linearGradient id="logoGrad" x1="0" y1="0" x2="80" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#C084FC"/>
    </linearGradient>
    <linearGradient id="logoGrad2" x1="0" y1="0" x2="80" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#A855F7"/>
      <stop offset="100%" stop-color="#E879F9"/>
    </linearGradient>

    <filter id="cardShadow" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="0" dy="12" stdDeviation="24" flood-color="#8b5cf6" flood-opacity="0.18"/>
    </filter>
    <filter id="softBlur">
      <feGaussianBlur stdDeviation="0.5"/>
    </filter>
  </defs>

  <!-- Page background -->
  <rect width="1200" height="630" fill="#FAFAFA"/>
  <!-- Grid lines -->
  <g stroke="rgba(15,23,42,0.028)" stroke-width="1">
    <line x1="40"  y1="0" x2="40"  y2="630"/><line x1="80"  y1="0" x2="80"  y2="630"/>
    <line x1="120" y1="0" x2="120" y2="630"/><line x1="160" y1="0" x2="160" y2="630"/>
    <line x1="200" y1="0" x2="200" y2="630"/><line x1="240" y1="0" x2="240" y2="630"/>
    <line x1="280" y1="0" x2="280" y2="630"/><line x1="320" y1="0" x2="320" y2="630"/>
    <line x1="360" y1="0" x2="360" y2="630"/><line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="440" y1="0" x2="440" y2="630"/><line x1="480" y1="0" x2="480" y2="630"/>
    <line x1="520" y1="0" x2="520" y2="630"/><line x1="560" y1="0" x2="560" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/><line x1="640" y1="0" x2="640" y2="630"/>
    <line x1="680" y1="0" x2="680" y2="630"/><line x1="720" y1="0" x2="720" y2="630"/>
    <line x1="760" y1="0" x2="760" y2="630"/><line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="840" y1="0" x2="840" y2="630"/><line x1="880" y1="0" x2="880" y2="630"/>
    <line x1="920" y1="0" x2="920" y2="630"/><line x1="960" y1="0" x2="960" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/><line x1="1040" y1="0" x2="1040" y2="630"/>
    <line x1="1080" y1="0" x2="1080" y2="630"/><line x1="1120" y1="0" x2="1120" y2="630"/>
    <line x1="1160" y1="0" x2="1160" y2="630"/>
    <line x1="0" y1="40"  x2="1200" y2="40"/> <line x1="0" y1="80"  x2="1200" y2="80"/>
    <line x1="0" y1="120" x2="1200" y2="120"/><line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="200" x2="1200" y2="200"/><line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="280" x2="1200" y2="280"/><line x1="0" y1="320" x2="1200" y2="320"/>
    <line x1="0" y1="360" x2="1200" y2="360"/><line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="440" x2="1200" y2="440"/><line x1="0" y1="480" x2="1200" y2="480"/>
    <line x1="0" y1="520" x2="1200" y2="520"/><line x1="0" y1="560" x2="1200" y2="560"/>
    <line x1="0" y1="600" x2="1200" y2="600"/>
  </g>
  <!-- Ambient gradients -->
  <rect width="1200" height="630" fill="url(#bg1)"/>
  <rect width="1200" height="630" fill="url(#bg2)"/>
  <rect width="1200" height="630" fill="url(#bg3)"/>

  <!-- Card border (gradient rim 3px) -->
  <rect x="80" y="60" width="1040" height="510" rx="36" fill="url(#cardBorder)" filter="url(#cardShadow)"/>
  <!-- Card white inner -->
  <rect x="83" y="63" width="1034" height="504" rx="33" fill="rgba(255,255,255,0.95)"/>

  <!-- Left content block -->
  <!-- Welcome pill -->
  <rect x="130" y="115" width="210" height="34" rx="17" fill="rgba(192,132,252,0.12)" stroke="rgba(167,139,250,0.3)" stroke-width="1"/>
  <text x="235" y="137" font-family="'Plus Jakarta Sans', system-ui, sans-serif" font-size="13" font-weight="700" fill="#9333EA" text-anchor="middle" letter-spacing="1">WELCOME, FUTURE CHEMIST!</text>

  <!-- Main headline -->
  <text x="130" y="205" font-family="Georgia, serif" font-size="52" font-weight="700" fill="#1E1B2E" font-style="italic">Science-backed</text>
  <text x="130" y="268" font-family="Georgia, serif" font-size="52" font-weight="700" fill="url(#textGrad)" font-style="italic">chemistry</text>
  <text x="130" y="331" font-family="Georgia, serif" font-size="52" font-weight="700" fill="#1E1B2E" font-style="italic">learning you can</text>
  <text x="130" y="394" font-family="Georgia, serif" font-size="52" font-weight="700" fill="url(#textGrad)" font-style="italic">trust</text>

  <!-- Subtitle -->
  <text x="130" y="440" font-family="'Plus Jakarta Sans', system-ui, sans-serif" font-size="18" fill="#64748B" font-weight="500">Join Mrs Ghada Omar's community and reserve</text>
  <text x="130" y="464" font-family="'Plus Jakarta Sans', system-ui, sans-serif" font-size="18" fill="#64748B" font-weight="500">your place in the 2027 courses.</text>

  <!-- Bottom brand strip -->
  <rect x="130" y="505" width="360" height="44" rx="22" fill="linear-gradient(135deg,#A855F7,#E879F9,#F472B6)"/>
  <rect x="130" y="505" width="360" height="44" rx="22" fill="#A855F7"/>
  <!-- gradient overlay on button -->
  <rect x="130" y="505" width="360" height="44" rx="22" fill="url(#cardBorder)" opacity="0.9"/>
  <text x="310" y="533" font-family="'Plus Jakarta Sans', system-ui, sans-serif" font-size="16" font-weight="700" fill="white" text-anchor="middle">Course Enrollment 2027</text>

  <!-- Divider line -->
  <line x1="720" y1="80" x2="720" y2="570" stroke="rgba(167,139,250,0.15)" stroke-width="1"/>

  <!-- Right side — logo + branding -->
  <g transform="translate(760, 180)">
    <!-- Big G logo -->
    <text x="0" y="130" fill="url(#logoGrad)" font-size="160" font-weight="800" font-family="'Plus Jakarta Sans', system-ui, sans-serif" opacity="0.12">G</text>
    <!-- Flask on top of G -->
    <g transform="translate(95, 20) scale(2.2)">
      <rect x="53" y="6" width="14" height="3" rx="1.5" fill="url(#logoGrad)" opacity="0.7"/>
      <path d="M55 9 v14 l-10 16 a11 11 0 0 0 9.5 16.5 h11 a11 11 0 0 0 9.5-16.5 l-10-16 V9 z"
            fill="none" stroke="url(#logoGrad)" stroke-width="2.4" stroke-linejoin="round"/>
      <path d="M45.5 47 a11 11 0 0 0 9 8.5 h11 a11 11 0 0 0 9-8.5 z"
            fill="url(#logoGrad2)" opacity="0.35"/>
      <circle cx="57" cy="48" r="2.4" fill="url(#logoGrad2)" opacity="0.7"/>
      <circle cx="65" cy="53" r="1.6" fill="url(#logoGrad2)" opacity="0.55"/>
      <circle cx="61" cy="44" r="1.1" fill="url(#logoGrad2)" opacity="0.45"/>
    </g>
  </g>

  <!-- Mrs Ghada Omar name -->
  <text x="960" y="390" font-family="'Plus Jakarta Sans', system-ui, sans-serif" font-size="32" font-weight="800" fill="#1E1B2E" text-anchor="middle">Mrs Ghada Omar</text>
  <text x="960" y="430" font-family="Georgia, serif" font-size="22" font-weight="500" fill="url(#textGrad)" text-anchor="middle" font-style="italic">Chemistry Forum</text>

  <!-- URL pill -->
  <rect x="830" y="490" width="260" height="38" rx="19" fill="rgba(167,139,250,0.1)" stroke="rgba(167,139,250,0.3)" stroke-width="1"/>
  <text x="960" y="514" font-family="'Plus Jakarta Sans', system-ui, sans-serif" font-size="13" fill="#9333EA" text-anchor="middle" font-weight="600">ms-ghada-forum.vercel.app</text>
</svg>
